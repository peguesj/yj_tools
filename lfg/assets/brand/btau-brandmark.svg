<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!--
    BTAU Brandmark — "Back That App Up"
    Concept: Vault door viewed straight-on. Outer ring = vault housing.
    Inner spoked wheel = combination lock. Arrow curving into the vault
    from below-left = the "back that up" ingest motion.
    Color: #06d6a0
  -->

  <!-- Outer vault ring -->
  <circle cx="32" cy="32" r="26" stroke="#06d6a0" stroke-width="2" />

  <!-- Vault door face (flat inner plate) -->
  <circle cx="32" cy="32" r="19" stroke="#06d6a0" stroke-width="1.5" />

  <!-- Locking bolts — 4 retractable pins at cardinal positions -->
  <!-- top bolt -->
  <line x1="32" y1="13" x2="32" y2="7" stroke="#06d6a0" stroke-width="2" stroke-linecap="round" />
  <!-- bottom bolt -->
  <line x1="32" y1="51" x2="32" y2="57" stroke="#06d6a0" stroke-width="2" stroke-linecap="round" />
  <!-- left bolt -->
  <line x1="13" y1="32" x2="7" y2="32" stroke="#06d6a0" stroke-width="2" stroke-linecap="round" />
  <!-- right bolt -->
  <line x1="51" y1="32" x2="57" y2="32" stroke="#06d6a0" stroke-width="2" stroke-linecap="round" />

  <!-- Combination dial — inner hub -->
  <circle cx="32" cy="32" r="7" stroke="#06d6a0" stroke-width="1.5" />

  <!-- Dial spokes (6, 60° apart) -->
  <g stroke="#06d6a0" stroke-width="1.5" stroke-linecap="round">
    <line x1="32" y1="25" x2="32" y2="22" />
    <line x1="38.06" y1="28.5" x2="40.6" y2="27" />
    <line x1="38.06" y1="35.5" x2="40.6" y2="37" />
    <line x1="32" y1="39" x2="32" y2="42" />
    <line x1="25.94" y1="35.5" x2="23.4" y2="37" />
    <line x1="25.94" y1="28.5" x2="23.4" y2="27" />
  </g>

  <!-- Center pip -->
  <circle cx="32" cy="32" r="2" fill="#06d6a0" />

  <!--
    Ingest arrow: a curved arc coming from bottom-left,
    looping up and ending with an arrowhead pointing INTO the vault ring.
    Path: start outside lower-left, arc up, terminate at vault ring edge left.
  -->
  <path
    d="M 10 52 C 4 40 4 20 17 13"
    stroke="#06d6a0"
    stroke-width="1.75"
    stroke-linecap="round"
    fill="none"
    stroke-dasharray="none"
  />
  <!-- Arrowhead at the end (pointing toward ~10 o'clock on outer ring) -->
  <polyline
    points="12,11 17,13 15,19"
    stroke="#06d6a0"
    stroke-width="1.75"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
