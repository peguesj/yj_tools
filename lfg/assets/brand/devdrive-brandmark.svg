<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!--
    DEVDRIVE Brandmark — "Developer Drive"
    Concept: A drive cylinder (bottom half) with a symlink/file-tree
    branching up from it. The tree uses angular 45-degree connector
    lines — like directory tree output in a terminal. A small chain-link
    symbol on each leaf node signals "symlink."
    Color: #c084fc
  -->

  <!-- Drive cylinder — bottom platform -->
  <!-- Cylinder top ellipse -->
  <ellipse cx="32" cy="46" rx="18" ry="5" stroke="#c084fc" stroke-width="1.75" />
  <!-- Cylinder body sides -->
  <line x1="14" y1="46" x2="14" y2="52" stroke="#c084fc" stroke-width="1.75" stroke-linecap="round" />
  <line x1="50" y1="46" x2="50" y2="52" stroke="#c084fc" stroke-width="1.75" stroke-linecap="round" />
  <!-- Cylinder bottom arc -->
  <path d="M 14 52 Q 32 58 50 52" stroke="#c084fc" stroke-width="1.75" stroke-linecap="round" fill="none" />
  <!-- Activity LED pip on drive face -->
  <circle cx="44" cy="47" r="1.5" fill="#c084fc" opacity="0.8" />
  <!-- Drive label line -->
  <line x1="20" y1="47" x2="38" y2="47" stroke="#c084fc" stroke-width="1" stroke-linecap="round" opacity="0.4" />

  <!-- ===== File tree growing upward from drive top ===== -->
  <!-- Root trunk: center up from cylinder top -->
  <line x1="32" y1="41" x2="32" y2="30" stroke="#c084fc" stroke-width="1.75" stroke-linecap="round" />

  <!-- Level 1: two branches at y=30 -->
  <!-- Left branch elbow -->
  <line x1="32" y1="30" x2="20" y2="30" stroke="#c084fc" stroke-width="1.5" stroke-linecap="round" />
  <line x1="20" y1="30" x2="20" y2="22" stroke="#c084fc" stroke-width="1.5" stroke-linecap="round" />
  <!-- Right branch elbow -->
  <line x1="32" y1="30" x2="44" y2="30" stroke="#c084fc" stroke-width="1.5" stroke-linecap="round" />
  <line x1="44" y1="30" x2="44" y2="22" stroke="#c084fc" stroke-width="1.5" stroke-linecap="round" />

  <!-- Level 2: left branch splits into two leaves -->
  <!-- Left-left leaf -->
  <line x1="20" y1="22" x2="13" y2="22" stroke="#c084fc" stroke-width="1.25" stroke-linecap="round" />
  <line x1="13" y1="22" x2="13" y2="16" stroke="#c084fc" stroke-width="1.25" stroke-linecap="round" />
  <!-- Left-right leaf -->
  <line x1="20" y1="22" x2="27" y2="22" stroke="#c084fc" stroke-width="1.25" stroke-linecap="round" />
  <line x1="27" y1="22" x2="27" y2="16" stroke="#c084fc" stroke-width="1.25" stroke-linecap="round" />

  <!-- Level 2: right branch — single deep leaf -->
  <line x1="44" y1="22" x2="44" y2="14" stroke="#c084fc" stroke-width="1.25" stroke-linecap="round" />

  <!-- Leaf node terminals — small open squares (symlink targets) -->
  <!-- Node: left-left -->
  <rect x="10" y="12" width="6" height="4" rx="1" stroke="#c084fc" stroke-width="1.25" />
  <!-- Node: left-right -->
  <rect x="24" y="12" width="6" height="4" rx="1" stroke="#c084fc" stroke-width="1.25" />
  <!-- Node: right (taller branch = deeper tree path) -->
  <rect x="41" y="10" width="6" height="4" rx="1" stroke="#c084fc" stroke-width="1.25" />

  <!-- Symlink arrow indicators on leaf nodes (→ shorthand: small arrow inside box) -->
  <!-- Arrow in left-left box -->
  <line x1="12" y1="14" x2="14.5" y2="14" stroke="#c084fc" stroke-width="1" stroke-linecap="round" />
  <polyline points="13.5,12.8 14.8,14 13.5,15.2" stroke="#c084fc" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <!-- Arrow in left-right box -->
  <line x1="26" y1="14" x2="28.5" y2="14" stroke="#c084fc" stroke-width="1" stroke-linecap="round" />
  <polyline points="27.5,12.8 28.8,14 27.5,15.2" stroke="#c084fc" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <!-- Arrow in right box -->
  <line x1="43" y1="12" x2="45.5" y2="12" stroke="#c084fc" stroke-width="1" stroke-linecap="round" />
  <polyline points="44.5,10.8 45.8,12 44.5,13.2" stroke="#c084fc" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
