<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 64" fill="none">
  <!--
    DEVDRIVE Wordmark — "Developer Drive"
    Monospace geometric. Accent color: #c084fc.
    Letterforms: D | E | V | D | R | I | V | E
    The first "D" is rendered as a drive-bay silhouette:
    flat top, flat bottom, curved right side (like a 3.5" drive slot).
    A slash separator between the two words (DEV / DRIVE).
    Baseline y=46, cap-height y=18 (28px tall glyphs).
    Letter pitch: ~14px each, total ~112px, left margin ~44px.
  -->

  <!-- ===========================
       DEV
  =========================== -->

  <!-- D (drive-bay letterform) -->
  <!-- Vertical stem -->
  <line x1="14" y1="18" x2="14" y2="46" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />
  <!-- Top bar -->
  <line x1="14" y1="18" x2="21" y2="18" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />
  <!-- Bottom bar -->
  <line x1="14" y1="46" x2="21" y2="46" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />
  <!-- Curved right side (drive bay arc) -->
  <path d="M 21 18 Q 32 32 21 46" stroke="#c084fc" stroke-width="2" stroke-linecap="round" fill="none" />
  <!-- Drive-bay LED slot (horizontal lines inside the D curve) -->
  <line x1="16" y1="26" x2="23" y2="26" stroke="#c084fc" stroke-width="1" stroke-linecap="round" opacity="0.5" />
  <line x1="16" y1="32" x2="25" y2="32" stroke="#c084fc" stroke-width="1" stroke-linecap="round" opacity="0.5" />
  <line x1="16" y1="38" x2="23" y2="38" stroke="#c084fc" stroke-width="1" stroke-linecap="round" opacity="0.5" />

  <!-- E -->
  <!-- Stem -->
  <line x1="36" y1="18" x2="36" y2="46" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />
  <!-- Top arm -->
  <line x1="36" y1="18" x2="48" y2="18" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />
  <!-- Middle arm (slightly shorter) -->
  <line x1="36" y1="32" x2="45" y2="32" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />
  <!-- Bottom arm -->
  <line x1="36" y1="46" x2="48" y2="46" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />

  <!-- V -->
  <!-- Left stroke -->
  <line x1="52" y1="18" x2="60" y2="46" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />
  <!-- Right stroke -->
  <line x1="68" y1="18" x2="60" y2="46" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />

  <!-- Separator slash -->
  <line x1="73" y1="50" x2="79" y2="14" stroke="#c084fc" stroke-width="1.25" stroke-linecap="round" opacity="0.45" />

  <!-- ===========================
       DRIVE
  =========================== -->

  <!-- D (second instance — same drive-bay treatment, slightly narrower pitch) -->
  <line x1="83" y1="18" x2="83" y2="46" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />
  <line x1="83" y1="18" x2="89" y2="18" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />
  <line x1="83" y1="46" x2="89" y2="46" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />
  <path d="M 89 18 Q 99 32 89 46" stroke="#c084fc" stroke-width="2" stroke-linecap="round" fill="none" />
  <!-- LED slots -->
  <line x1="85" y1="26" x2="91" y2="26" stroke="#c084fc" stroke-width="1" stroke-linecap="round" opacity="0.5" />
  <line x1="85" y1="32" x2="93" y2="32" stroke="#c084fc" stroke-width="1" stroke-linecap="round" opacity="0.5" />
  <line x1="85" y1="38" x2="91" y2="38" stroke="#c084fc" stroke-width="1" stroke-linecap="round" opacity="0.5" />

  <!-- R -->
  <!-- Stem -->
  <line x1="103" y1="18" x2="103" y2="46" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />
  <!-- Top bar -->
  <line x1="103" y1="18" x2="110" y2="18" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />
  <!-- Bowl arc (top half only) -->
  <path d="M 110 18 A 5 7 0 0 1 110 32" stroke="#c084fc" stroke-width="2" stroke-linecap="round" fill="none" />
  <!-- Mid connector -->
  <line x1="103" y1="32" x2="110" y2="32" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />
  <!-- Leg diagonal -->
  <line x1="110" y1="32" x2="116" y2="46" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />

  <!-- I -->
  <!-- Top serif -->
  <line x1="119" y1="18" x2="127" y2="18" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />
  <!-- Stem -->
  <line x1="123" y1="18" x2="123" y2="46" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />
  <!-- Bottom serif -->
  <line x1="119" y1="46" x2="127" y2="46" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />

  <!-- V (second instance) -->
  <line x1="131" y1="18" x2="139" y2="46" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />
  <line x1="147" y1="18" x2="139" y2="46" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />

  <!-- E (second instance) -->
  <line x1="151" y1="18" x2="151" y2="46" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />
  <line x1="151" y1="18" x2="163" y2="18" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />
  <line x1="151" y1="32" x2="160" y2="32" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />
  <line x1="151" y1="46" x2="163" y2="46" stroke="#c084fc" stroke-width="2" stroke-linecap="round" />

  <!-- Tagline micro-text -->
  <text
    x="88"
    y="59"
    font-family="'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace"
    font-size="6.5"
    fill="#c084fc"
    opacity="0.5"
    text-anchor="middle"
    letter-spacing="1.5"
  >DEVELOPER DRIVE</text>
</svg>
