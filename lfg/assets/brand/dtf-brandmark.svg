<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!--
    DTF Brandmark — "Delete Temp Files"
    Concept: A broom sweeping a stack of data blocks.
    - Three stacked rectangular blocks (temp files) sit in the lower-right.
    - A broom shape sweeps from upper-left to lower-right, with bristles
      fanning out at the sweep head, scattering the blocks.
    - Two small dislodged block fragments trail behind the sweep,
      suggesting files being cleared away.
    Color: #ff8c42
  -->

  <!-- ===== Broom handle ===== -->
  <!-- Handle: diagonal stroke from upper-left to lower-right -->
  <line x1="8" y1="8" x2="44" y2="44"
        stroke="#ff8c42" stroke-width="2.5"
        stroke-linecap="round"/>

  <!-- ===== Broom head / bristles ===== -->
  <!--
    Bristle fan radiates from the handle tip at ~(44,44),
    spreading downward-left like a brush hitting a surface.
    Bristles point toward the sweep direction (lower-right corner).
  -->
  <!-- Bristle backing block -->
  <rect x="40" y="42" width="14" height="5" rx="1"
        fill="#ff8c42" opacity="0.9"
        transform="rotate(45 44 44)"/>

  <!-- Individual bristle lines fanning from head -->
  <line x1="44" y1="47" x2="38" y2="58"
        stroke="#ff8c42" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="47" y1="47" x2="44" y2="59"
        stroke="#ff8c42" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="46" x2="50" y2="58"
        stroke="#ff8c42" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="53" y1="44" x2="56" y2="56"
        stroke="#ff8c42" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="55" y1="42" x2="61" y2="52"
        stroke="#ff8c42" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ===== Stacked temp file blocks (being swept) ===== -->
  <!-- Block stack, slightly offset to the right of broom path -->
  <!-- Block 1 (bottom) -->
  <rect x="34" y="44" width="16" height="6" rx="1"
        stroke="#ff8c42" stroke-width="1.5"
        fill="#ff8c42" fill-opacity="0.2"/>
  <!-- Block 2 (middle) -->
  <rect x="34" y="37" width="16" height="6" rx="1"
        stroke="#ff8c42" stroke-width="1.5"
        fill="#ff8c42" fill-opacity="0.2"/>
  <!-- Block 3 (top) -->
  <rect x="34" y="30" width="16" height="6" rx="1"
        stroke="#ff8c42" stroke-width="1.5"
        fill="#ff8c42" fill-opacity="0.2"/>

  <!-- Internal data lines in each block (suggesting file content) -->
  <line x1="36" y1="33" x2="48" y2="33"
        stroke="#ff8c42" stroke-width="0.75" stroke-linecap="round" opacity="0.5"/>
  <line x1="36" y1="40" x2="48" y2="40"
        stroke="#ff8c42" stroke-width="0.75" stroke-linecap="round" opacity="0.5"/>
  <line x1="36" y1="47" x2="48" y2="47"
        stroke="#ff8c42" stroke-width="0.75" stroke-linecap="round" opacity="0.5"/>

  <!-- ===== Scattered / dislodged block fragments ===== -->
  <!-- Fragment 1: small block flying upper-left, rotated -->
  <rect x="6" y="28" width="8" height="4" rx="1"
        stroke="#ff8c42" stroke-width="1.5"
        fill="#ff8c42" fill-opacity="0.15"
        transform="rotate(-20 10 30)"/>

  <!-- Fragment 2: tinier block further out -->
  <rect x="10" y="14" width="5" height="3" rx="0.5"
        stroke="#ff8c42" stroke-width="1.5"
        fill="#ff8c42" fill-opacity="0.1"
        transform="rotate(-35 12 15)"/>

  <!-- Fragment 3: pixel-like dot suggesting final dissolution -->
  <rect x="4" y="18" width="3" height="3" rx="0.5"
        fill="#ff8c42" opacity="0.4"/>

  <!-- Motion trail dots along broom path -->
  <circle cx="20" cy="20" r="1.5" fill="#ff8c42" opacity="0.3"/>
  <circle cx="28" cy="28" r="1.5" fill="#ff8c42" opacity="0.3"/>
  <circle cx="36" cy="36" r="1.5" fill="#ff8c42" opacity="0.3"/>
</svg>
