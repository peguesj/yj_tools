<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 64" fill="none">
  <!--
    DTF Wordmark — "Delete Temp Files"
    Monospace, geometric. Three letters on a 32px cap-height grid.
    Top baseline: y=16  Bottom baseline: y=48
    Color: #ff8c42

    Concept integrations:
      D — left side of D has a small "notch" cut in it, like a sector
          being deleted from a block. The right curve bulges as if
          pressurized (data being swept out).
      T — the vertical stem IS the broom handle: it terminates at the
          bottom in a bristle-fan shape (three short splayed strokes).
      F — the horizontal bars are stacked file-block silhouettes,
          each with a subtle inline "data line", suggesting temp file layers.
  -->

  <!-- ====== D ====== -->
  <!-- D spine -->
  <line x1="12" y1="16" x2="12" y2="48"
        stroke="#ff8c42" stroke-width="2" stroke-linecap="round"/>
  <!-- D top cap -->
  <line x1="12" y1="16" x2="22" y2="16"
        stroke="#ff8c42" stroke-width="2" stroke-linecap="round"/>
  <!-- D bottom cap -->
  <line x1="12" y1="48" x2="22" y2="48"
        stroke="#ff8c42" stroke-width="2" stroke-linecap="round"/>
  <!-- D right curve (path arc bulging right) -->
  <path d="M22,16 C35,16 35,48 22,48"
        stroke="#ff8c42" stroke-width="2"
        stroke-linecap="round" fill="none"/>
  <!-- Delete notch on D spine — a small rectangular cutout at mid-left -->
  <rect x="10" y="29" width="5" height="6" rx="0.5"
        fill="#0d1117" stroke="#ff8c42" stroke-width="0.5"/>
  <!-- Notch X mark (delete indicator) -->
  <line x1="11" y1="30" x2="14" y2="34"
        stroke="#ff8c42" stroke-width="0.75" stroke-linecap="round" opacity="0.8"/>
  <line x1="14" y1="30" x2="11" y2="34"
        stroke="#ff8c42" stroke-width="0.75" stroke-linecap="round" opacity="0.8"/>

  <!-- ====== T ====== -->
  <!-- T crossbar -->
  <line x1="48" y1="16" x2="70" y2="16"
        stroke="#ff8c42" stroke-width="2" stroke-linecap="round"/>
  <!-- T stem (broom handle) — runs to y=44 then terminates in bristles -->
  <line x1="59" y1="16" x2="59" y2="44"
        stroke="#ff8c42" stroke-width="2" stroke-linecap="round"/>
  <!-- Broom bristle fan at base of T stem -->
  <!-- Bristle backing band -->
  <line x1="53" y1="44" x2="65" y2="44"
        stroke="#ff8c42" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bristle lines fanning downward -->
  <line x1="53" y1="44" x2="50" y2="52"
        stroke="#ff8c42" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="56" y1="44" x2="54" y2="53"
        stroke="#ff8c42" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="59" y1="44" x2="59" y2="53"
        stroke="#ff8c42" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="62" y1="44" x2="64" y2="53"
        stroke="#ff8c42" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="65" y1="44" x2="68" y2="52"
        stroke="#ff8c42" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ====== F ====== -->
  <!-- F spine -->
  <line x1="82" y1="16" x2="82" y2="48"
        stroke="#ff8c42" stroke-width="2" stroke-linecap="round"/>
  <!--
    F bars styled as stacked file blocks (three horizontal rectangles
    with a subtle inline data-line each, suggesting temp file layers).
  -->
  <!-- Top bar: file block -->
  <rect x="82" y="15" width="18" height="7" rx="1"
        fill="#ff8c42" fill-opacity="0.15"
        stroke="#ff8c42" stroke-width="1.5"/>
  <!-- Data line inside top block -->
  <line x1="84" y1="18.5" x2="98" y2="18.5"
        stroke="#ff8c42" stroke-width="0.75" stroke-linecap="round" opacity="0.55"/>

  <!-- Middle bar: file block (shorter, like mid-F bar) -->
  <rect x="82" y="28" width="14" height="7" rx="1"
        fill="#ff8c42" fill-opacity="0.12"
        stroke="#ff8c42" stroke-width="1.5"/>
  <!-- Data line inside mid block -->
  <line x1="84" y1="31.5" x2="94" y2="31.5"
        stroke="#ff8c42" stroke-width="0.75" stroke-linecap="round" opacity="0.55"/>

  <!-- Fade/scatter effect: a third ghost block suggesting one already swept away -->
  <rect x="82" y="41" width="10" height="7" rx="1"
        fill="#ff8c42" fill-opacity="0.06"
        stroke="#ff8c42" stroke-width="1"
        stroke-dasharray="2 2" opacity="0.5"/>

  <!-- ===== Subtext label: "DELETE TEMP FILES" as tiny block ticks ===== -->
  <!-- Three small pixel squares evoking the three words / three file blocks -->
  <rect x="110" y="26" width="4" height="4" rx="0.5"
        fill="#ff8c42" opacity="0.4"/>
  <rect x="118" y="26" width="4" height="4" rx="0.5"
        fill="#ff8c42" opacity="0.4"/>
  <rect x="126" y="26" width="4" height="4" rx="0.5"
        fill="#ff8c42" opacity="0.4"/>

  <!-- Swept-away motion trail dots (three scattered dots) -->
  <circle cx="140" cy="22" r="1.5" fill="#ff8c42" opacity="0.25"/>
  <circle cx="148" cy="28" r="1.5" fill="#ff8c42" opacity="0.25"/>
  <circle cx="156" cy="22" r="1.5" fill="#ff8c42" opacity="0.25"/>

  <!-- DTF tagline rule line -->
  <line x1="110" y1="38" x2="170" y2="38"
        stroke="#ff8c42" stroke-width="0.75"
        stroke-dasharray="3 3"
        opacity="0.3"/>
</svg>
