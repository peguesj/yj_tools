<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!--
    STFU Brandmark — Source Tree Forensics & Unification
    Concept: Two interleaved code-bracket strands merging into a unified root.
    Left strand (outer brackets) and right strand (inner chevrons) weave
    together, converging at a central junction node — evoking git-merge,
    DNA-helix duality, and forensic analysis.
  -->

  <!-- Background: transparent (dark-mode-first) -->

  <!-- === LEFT BRANCH — outer square brackets === -->
  <!-- Top-left bracket -->
  <path d="M14 8 L8 8 L8 20" stroke="#e879f9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-left bracket -->
  <path d="M8 44 L8 56 L14 56" stroke="#e879f9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- === RIGHT BRANCH — inner angle brackets === -->
  <!-- Top-right chevron -->
  <path d="M50 8 L56 8 L56 20" stroke="#e879f9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom-right chevron -->
  <path d="M56 44 L56 56 L50 56" stroke="#e879f9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- === INTERLEAVE STRANDS — weaving paths === -->
  <!-- Left strand weaving right-to-center -->
  <path d="M8 28 C8 28 16 28 20 32 C24 36 28 36 32 32" stroke="#e879f9" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <!-- Right strand weaving left-to-center -->
  <path d="M56 36 C56 36 48 36 44 32 C40 28 36 28 32 32" stroke="#e879f9" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Cross-strands (helix cross-overs) -->
  <path d="M8 36 C8 36 16 36 20 32 C24 28 28 28 32 32" stroke="#e879f9" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M56 28 C56 28 48 28 44 32 C40 36 36 36 32 32" stroke="#e879f9" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- === VERTICAL SPINES — source tree trunks === -->
  <line x1="8" y1="20" x2="8" y2="44" stroke="#e879f9" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="56" y1="20" x2="56" y2="44" stroke="#e879f9" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Branch tick marks on left spine -->
  <line x1="8" y1="26" x2="14" y2="26" stroke="#e879f9" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="8" y1="38" x2="14" y2="38" stroke="#e879f9" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Branch tick marks on right spine -->
  <line x1="56" y1="26" x2="50" y2="26" stroke="#e879f9" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="56" y1="38" x2="50" y2="38" stroke="#e879f9" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- === CENTRAL UNIFICATION NODE — merge point === -->
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="5.5" stroke="#e879f9" stroke-width="1.5" fill="none"/>
  <!-- Inner fill dot -->
  <circle cx="32" cy="32" r="2.5" fill="#e879f9"/>

  <!-- === MAGNIFIER OVERLAY — forensics hint === -->
  <!-- Lens arc (top-right quadrant only, subtle) -->
  <path d="M38 26 A8 8 0 0 1 46 34" stroke="#e879f9" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- Handle -->
  <line x1="44" y1="36" x2="49" y2="41" stroke="#e879f9" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
</svg>
