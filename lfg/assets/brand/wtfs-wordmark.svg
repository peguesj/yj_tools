<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 64" fill="none">
  <!--
    WTFS Wordmark — "Where's The Free Space"
    Monospace, geometric. Each letter hand-drawn on a 12×32 grid
    with 2px stroke, centered vertically in the 64-tall canvas.
    Top baseline: y=16  Bottom baseline: y=48  Cap height: 32px.
    Letter spacing: 14px wide per char, 8px gap between chars.

    Concept integrations:
      W — twin peaks like a waveform / storage histogram bars
      T — crossbar is a horizontal scan line with small tick marks
      F — two horizontal bars suggest directory tree branches
      S — curved compression shape with a notch suggesting fragmentation

    Color: #4a9eff
  -->

  <!-- ====== W ====== -->
  <!-- W: four diagonal strokes forming double-V waveform peaks -->
  <!-- Left outer down stroke -->
  <polyline points="8,16 13,48 18,28 23,48 28,16"
            stroke="#4a9eff" stroke-width="2"
            stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Histogram tick behind W (subtle scan reference) -->
  <line x1="10" y1="48" x2="10" y2="44"
        stroke="#4a9eff" stroke-width="1" opacity="0.35"/>
  <line x1="16" y1="48" x2="16" y2="40"
        stroke="#4a9eff" stroke-width="1" opacity="0.35"/>
  <line x1="22" y1="48" x2="22" y2="44"
        stroke="#4a9eff" stroke-width="1" opacity="0.35"/>
  <line x1="26" y1="48" x2="26" y2="42"
        stroke="#4a9eff" stroke-width="1" opacity="0.35"/>

  <!-- ====== T ====== -->
  <!-- T vertical stem -->
  <line x1="45" y1="16" x2="45" y2="48"
        stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
  <!-- T crossbar — styled as a scan line with tick marks -->
  <line x1="34" y1="16" x2="56" y2="16"
        stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
  <!-- Scan ticks on crossbar -->
  <line x1="37" y1="13" x2="37" y2="16"
        stroke="#4a9eff" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="41" y1="14" x2="41" y2="16"
        stroke="#4a9eff" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="49" y1="14" x2="49" y2="16"
        stroke="#4a9eff" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="53" y1="13" x2="53" y2="16"
        stroke="#4a9eff" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

  <!-- ====== F ====== -->
  <!-- F vertical spine -->
  <line x1="65" y1="16" x2="65" y2="48"
        stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
  <!-- F top bar -->
  <line x1="65" y1="16" x2="80" y2="16"
        stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
  <!-- F mid bar — slightly shorter, directory-tree branch feel -->
  <line x1="65" y1="32" x2="77" y2="32"
        stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
  <!-- Tree branch dots -->
  <circle cx="80" cy="16" r="1.5" fill="#4a9eff" opacity="0.7"/>
  <circle cx="77" cy="32" r="1.5" fill="#4a9eff" opacity="0.7"/>

  <!-- ====== S ====== -->
  <!--
    S: two arcs with a fragmentation notch at the midpoint.
    Upper arc: curves right-to-left from top
    Lower arc: curves left-to-right at bottom
    Notch: short diagonal break at mid, evoking fragmented sector
  -->
  <!-- Upper arc of S (top-right to mid-left) -->
  <path d="M97,20 C97,16 92,14 88,16 C84,18 83,24 87,27"
        stroke="#4a9eff" stroke-width="2"
        stroke-linecap="round" fill="none"/>
  <!-- Fragmentation notch at mid -->
  <line x1="87" y1="27" x2="93" y2="37"
        stroke="#4a9eff" stroke-width="2"
        stroke-linecap="round" opacity="0.9"/>
  <!-- Lower arc of S (mid-right to bottom-left) -->
  <path d="M93,37 C97,40 97,46 93,48 C89,50 84,48 83,44"
        stroke="#4a9eff" stroke-width="2"
        stroke-linecap="round" fill="none"/>

  <!-- ====== Subscript label ====== -->
  <!-- Small monospace tag: "where's the free space" abbreviated below -->
  <!-- Three dot separator -->
  <circle cx="112" cy="43" r="1.2" fill="#4a9eff" opacity="0.4"/>
  <circle cx="117" cy="43" r="1.2" fill="#4a9eff" opacity="0.4"/>
  <circle cx="122" cy="43" r="1.2" fill="#4a9eff" opacity="0.4"/>

  <!-- Subtext rendered as tiny geometric lines suggesting "DISK SCAN" label -->
  <!-- D -->
  <path d="M112,18 L112,30 L117,30 C121,30 122,24 118,18 Z"
        stroke="#4a9eff" stroke-width="1" fill="none" opacity="0.45"/>
  <!-- I -->
  <line x1="125" y1="18" x2="125" y2="30"
        stroke="#4a9eff" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <!-- S -->
  <path d="M133,21 C133,18 130,17 128,19 C126,21 128,24 131,25 C134,26 135,29 133,31 C131,33 128,32 128,30"
        stroke="#4a9eff" stroke-width="1"
        stroke-linecap="round" fill="none" opacity="0.45"/>
  <!-- K -->
  <line x1="137" y1="18" x2="137" y2="30"
        stroke="#4a9eff" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <polyline points="137,24 142,18"
            stroke="#4a9eff" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <polyline points="137,24 142,30"
            stroke="#4a9eff" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
</svg>
